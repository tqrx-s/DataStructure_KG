<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基于 neo4j的数据结构知识图谱的设计与实现</title>

    <script src="../static/js/jquery-2.2.4.min.js"></script>
    <link href="../static/css/bootstrap.min.css" rel="stylesheet">
    <link href="../static/css/nifty.min.css" rel="stylesheet">
    <script src="../static/js/bootstrap.min.js"></script>
    <script src="../static/js/echarts.min.js"></script>

    
</head>
<body>

<div class="row" style="height: 20px;"></div>
<section class="container search">
        <div class="input-group">
            <input type="text" id="search" class="form-control input-lg" placeholder="请输入你要检索的行为...">
                <span class="input-group-addon btn btn-mint" id="c_search">搜索</span>
                <span type="button" class="input-group-addon btn btn-mint" data-toggle="modal" data-target="#myModal">新增实体</span>
        </div>
</section>


<!--    自定义搜索条件区域  -->
<div class="fixed-table-toolbar">

    <!-- 新增模态框（Modal） -->
    <!--<form onsubmit="add_func(event)" action="http://localhost:3000/add" method="POST" class="form-horizontal" role="form" id="add_item_from">-->
    <form action="http://localhost:5000/add" method="POST" class="form-horizontal" role="form" id="add_item_from">
        <div class="modal fade" id="myModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel"
             aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <button type="button" class="close" data-dismiss="modal" aria-hidden="true">
                            &times;
                        </button>
                        <h4 class="modal-title" id="myModalLabel">
                            新增项目
                        </h4>
                    </div>
                    <div class="modal-body" style="height: 100%;">
                        <div class="form-group">
                            <label for="browser1" class="col-sm-3 control-label">选择人物身份</label>
                            <div class="col-sm-7">
                                <select data-placeholder="选择人物身份..." class="form-control" name="character"
                                        id="character">
                                    <option value="">请选择人物身份</option>
                                    <option value="老师" hassubinfo="true">老师</option>
                                    <option value="学生" hassubinfo="true">学生</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="browser2" class="col-sm-3 control-label">输入人物行为</label>
                            <div class="col-sm-7">
                                <input type="text" class="form-control" name="action" id="action"
                                       placeholder="请输入人物行为">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="browser3" class="col-sm-3 control-label">输入关系名称</label>
                            <div class="col-sm-7">
                                <input type="text" class="form-control" name="relation" id="relation"
                                       placeholder="请输入关系名称">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="browser4" class="col-sm-3 control-label">选择行为级别</label>
                            <div class="col-sm-7">
                                <select data-placeholder="选择级别..." class="form-control" name="level"
                                        id="level">
                                    <option value="">请选择行为级别</option>
                                    <option value="一级概念" hassubinfo="true">一级概念</option>
                                    <option value="二级概念" hassubinfo="true">二级概念</option>
                                    <option value="三级概念" hassubinfo="true">三级概念</option>
                                    <option value="四级概念" hassubinfo="true">四级概念</option>
                                    <option value="五级概念" hassubinfo="true">五级概念</option>
                                    <option value="六级概念" hassubinfo="true">六级概念</option>
                                    <option value="函数" hassubinfo="true">函数</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
                        <input type="submit" class="btn btn-primary" id="add_submit" value="提交"/>
                    </div>
                </div>
            </div>
        </div>
    </form>
    
    
    

</div>








<div id="container" class="effect aside-float aside-bright mainnav-lg">
    <div class="boxed">
        <div id="content-container">
            <div id="page-content">
                <div class="row" style="height: 40px;"></div>
                <div class="col-lg-8" style="height: 600px; width: 100%" id="guanxi"></div>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript" src="../static/js/option_teacher_student.js"></script>
<script type="text/javascript" src="../static/js/cloud_search.js"></script>
<!--<script type="text/javascript" src="../static/js/layer.js"></script>-->

<script>
    myChart.setOption(option, true);
    $(document).keypress(function (e) {
        // 回车键事件
        if (e.which == 13) {
            var name = $("#search").val();
            if(name=='')
                myChart.setOption(option, true);
            else
                search(name);
        }
    });
    $("#c_search").click(function () {
        var name = $("#search").val();
        if(name=='')
            myChart.setOption(option, true);
        else
            search(name);
    })
    
    function add_func(event){
        const form = document.getElementById("add_item_from");
        const formData = new FormData(form);
        
        const cha = formData.get("character");
        const act = formData.get("action");
        const rel = formData.get("relation");
        const lev = formData.get("level");
        
        console.log(cha,act,rel,lev);
        
        fetch('http://localhost:3000/add', {
            method: 'POST',
            body: formData
        })
        .then(response => response.text())
        .then(data => {
            alert(data); // 显示响应
            $('#myModal').modal('hide'); // 关闭模态框
        })
        .catch(error => console.error('Error:', error));
        
        console.log('已经传到后端！');
    }
    
    
    
    
</script>

</body>
</html>
